name: hltv-no-spoilers-clean-packages
on:
  push:
    branches:
      - main

jobs:
  clean-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Clean backend container packages
        uses: actions/delete-package-versions@v5
        with:
          package-name: hltv-no-spoilers/hltv-no-spoilers-go
          package-type: 'container'
          min-versions-to-keep: 3
          token: ${{ secrets.REGISTRY_TOKEN }}
